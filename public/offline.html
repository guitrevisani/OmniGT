<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sem conexão — Triap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 2.5rem; }
    h1 { font-size: 1.1rem; font-weight: 700; color: #f8fafc; }
    p  { font-size: 0.85rem; color: #64748b; max-width: 280px; line-height: 1.5; }
    button {
      margin-top: 0.5rem;
      background: #3b82f6;
      border: none;
      border-radius: 0.5rem;
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.65rem 1.5rem;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Sem conexão</h1>
  <p>Verifique sua internet e tente novamente. Seus dados estarão aqui quando você voltar.</p>
  <button onclick="location.reload()">Tentar novamente</button>
</body>
</html>
